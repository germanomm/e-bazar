---
layout: default
title: Home
---
<style>
    .intro-section {
        max-width: 650px;
        margin: 0 auto 5rem;
        text-align: center;
    }
    .intro-section p {
        font-size: 1.1rem;
        color: var(--secondary);
        line-height: 1.6;
    }
    .badge-perfil {
        display: inline-block;
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
    }
    .badge-perfil:hover { text-decoration: underline; }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 4rem 2.5rem;
    }
    .product-card {
        text-decoration: none;
        color: inherit;
    }
    .img-wrapper {
        background: var(--subtle-bg);
        border-radius: 12px;
        padding: 20px; /* Dá um respiro para a imagem */
        margin-bottom: 1.2rem;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover .img-wrapper {
        transform: scale(1.02);
    }
    .img-wrapper img {
        width: 100%;
        height: auto;
        aspect-ratio: 3/4;
        object-fit: contain; /* Não corta a capa do livro */
        border-radius: 4px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .product-card h3 { font-size: 1.1rem; margin: 0; font-weight: 600; }
    .product-card .price { color: var(--secondary); margin-top: 0.4rem; font-size: 1rem; }
</style>

<section class="intro-section">
    <p>Objetos pessoais disponíveis para venda via <strong>OLX</strong>, com garantia de segurança e transação protegida.</p>
    <a href="https://www.olx.com.br/perfil/germano-cfa4a2b5" target="_blank" class="badge-perfil">
        Ver perfil de vendedor qualificado →
    </a>
</section>

<div class="product-grid">
  {% for post in site.posts %}
    <a href="{{ post.url }}" class="product-card">
        <div class="img-wrapper">
            <img src="{{ post.imagem }}" alt="{{ post.title }}">
        </div>
        <h3>{{ post.title }}</h3>
        <p class="price">R$ {{ post.preco }}</p>
    </a>
  {% endfor %}
</div>
