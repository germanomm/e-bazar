---
layout: default
title: Vitrine
---
<style>
    .intro-text {
        text-align: center;
        max-width: 500px;
        margin: 0 auto 80px;
        font-size: 14px;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        text-transform: uppercase;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 50px 30px;
    }
    
    .product-card { 
        text-decoration: none; 
        color: inherit; 
        transition: all 0.4s ease;
    }
    
    .img-wrapper {
        background: var(--card-bg);
        border-radius: 40px; /* Bordas bem redondas estilo Oh My Candy */
        padding: 40px;
        margin-bottom: 25px;
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        transition: all 0.4s ease;
    }
    
    .product-card:hover .img-wrapper {
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        transform: translateY(-10px);
    }
    
    .img-wrapper img {
        max-height: 100%;
        width: auto;
        object-fit: contain;
        transition: transform 0.6s ease;
    }

    .product-card:hover img { transform: scale(1.1); }
    
    .product-info { text-align: center; }
    .product-info h3 { 
        font-size: 16px; font-weight: 500; margin-bottom: 8px; 
        letter-spacing: 0.02em;
    }
    .product-info .price { 
        color: var(--accent); font-weight: 400; font-size: 18px; 
    }
</style>

<div class="intro-text">
    Curadoria exclusiva de itens pessoais. <br>
    Qualidade e sofisticação em cada detalhe.
</div>

<div class="product-grid">
  {% for post in site.posts %}
    <a href="{{ post.url }}" class="product-card">
        <div class="img-wrapper">
            <img src="{{ post.imagem }}" alt="{{ post.title }}">
        </div>
        <div class="product-info">
            <h3>{{ post.title }}</h3>
            <p class="price">R$ {{ post.preco }}</p>
        </div>
    </a>
  {% endfor %}
</div>

<!-- JSON-LD ItemList -->
<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "ItemList",
  "itemListElement": [
    {% for post in site.posts %}
    {
      "@type": "ListItem",
      "position": {{ forloop.index }},
      "url": "{{ site.url }}{{ post.url }}",
      "name": "{{ post.title }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
