# Configurações Gerais
title: E-BAZAR GMM
url: "https://e-bazar.gmm.tec.br"
baseurl: ""

# Estrutura de Links
# Força o formato /categoria/titulo/ (remove ano/mês/dia da URL)
permalink: /:categories/:title/

# Desativa temas externos para usar nosso CSS customizado
theme: null
remote_theme: null

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Processamento de Arquivos
markdown: kramdown
include: ["_posts", "_layouts", "assets", "_data"]
exclude: ["Gemfile", "Gemfile.lock", "node_modules", "vendor/"]
