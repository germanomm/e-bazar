<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | GMM</title>
    <style>
        /* Reset básico para garantir que o tema antigo suma */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --apple-bg: #ffffff;
            --apple-text: #1d1d1f;
            --apple-secondary: #6e6e73;
            --apple-link: #0066cc;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif !important; 
            background-color: var(--apple-bg) !important; 
            color: var(--apple-text) !important;
            -webkit-font-smoothing: antialiased;
            line-height: 1.47059;
        }

        header { 
            padding: 80px 20px 40px; 
            text-align: center; 
        }

        header h1 a { 
            text-decoration: none; 
            color: var(--apple-text); 
            font-weight: 600; 
            font-size: 21px; 
            letter-spacing: -0.022em;
        }

        main { 
            max-width: 980px; 
            margin: 0 auto; 
            padding: 0 20px 100px; 
        }

        footer { 
            text-align: center; 
            padding: 40px 20px; 
            border-top: 1px solid #d2d2d7; 
            color: var(--apple-secondary); 
            font-size: 12px; 
        }

        .btn-olx { 
            display: inline-block; 
            background: #0071e3; 
            color: #fff; 
            padding: 8px 16px; 
            text-decoration: none; 
            border-radius: 980px; 
            font-size: 14px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <header><h1><a href="/">E-BAZAR GMM</a></h1></header>
    <main>{{ content }}</main>
    <footer><p>&copy; 2026 GMM</p></footer>
</body>
</html>
