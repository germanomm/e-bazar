<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-bazar | GMM | {{ page.title }} </title>
    <style>
        :root {
            --bg-color: #f8f3f0;      /* Bege Nude (estilo Oh My Candy) */
            --card-bg: #ffffff;       /* Branco para profundidade */
            --text-main: #2d2d2d;     /* Cinza grafite suave */
            --text-secondary: #7a7a7a; 
            --accent: #c5a880;        /* Tom Champagne/Dourado fosco */
            --border: #ece4dd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        header { padding: 100px 20px 60px; text-align: center; }
        header h1 a { 
            text-decoration: none; color: var(--text-main); 
            font-weight: 300; font-size: 1.5rem; letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }

        footer { 
            text-align: center; padding: 100px 20px; 
            color: var(--text-secondary); font-size: 10px; 
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        .btn-olx { 
            display: inline-block; background: var(--text-main); color: #fff; 
            padding: 15px 35px; text-decoration: none; border-radius: 50px; 
            font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; transition: all 0.4s ease;
        }
        .btn-olx:hover { 
            background: var(--accent);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header><h1><a href="/">E-BAZAR GMM</a></h1></header>
    <main>{{ content }}</main>
    <footer><p>&copy; 2026 GMM</p></footer>
</body>
</html>
