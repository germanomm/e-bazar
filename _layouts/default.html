<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | GMM</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent: #6e0ad6;
            --border: #e5e5e7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            line-height: 1.5;
        }

        header { 
            padding: 4rem 2rem 2rem; 
            text-align: center;
        }

        header h1 a { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            letter-spacing: -0.02em;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        main { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 2rem 4rem; 
        }

        footer { 
            text-align: center; 
            padding: 4rem 2rem; 
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--secondary);
        }

        /* Estilos Globais para Botões e Links */
        .btn-olx { 
            display: inline-block;
            background: var(--text); 
            color: #fff; 
            padding: 0.8rem 1.5rem; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 500;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-olx:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">E-BAZAR GMM</a></h1>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        <p>&copy; 2026 GMM | e-bazar.gmm.tec.br</p>
    </footer>
</body>
</html>
