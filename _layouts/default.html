<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | GMM</title>
    <style>
        :root {
            --bg: #ffffff;
            --subtle-bg: #fbfbfd;
            --text: #1d1d1f;
            --secondary: #6e6e73;
            --accent: #0066cc; /* Azul clássico e confiável */
            --border: #d2d2d7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        header { 
            padding: 4rem 2rem 2rem; 
            text-align: center; 
        }

        header h1 a { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            font-size: 1.1rem; 
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        main { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 2rem 6rem; 
        }

        .btn-olx { 
            display: inline-block; 
            background: var(--text); 
            color: #fff; 
            padding: 10px 22px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 500; 
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-olx:hover {
            background: #424245;
            transform: translateY(-1px);
        }

        footer { 
            text-align: center; 
            padding: 4rem; 
            border-top: 1px solid #f2f2f2; 
            color: var(--secondary); 
            font-size: 0.8rem; 
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">E-BAZAR GMM</a></h1>
    </header>
    <main>
        {{ content }}
    </main>
    <footer>
        <p>&copy; 2026 GMM</p>
    </footer>
</body>
</html>
