---
layout: default
---
<article style="display: flex; gap: 2rem; flex-wrap: wrap;">
    <img src="{{ page.imagem }}" alt="{{ page.title }}" style="width: 300px; border-radius: 8px;">
    <div style="flex: 1; min-width: 300px;">
        <h2>{{ page.title }}</h2>
        <p style="font-size: 1.5rem; font-weight: bold; color: #2d3436;">R$ {{ page.preco }}</p>
        <p>{{ content }}</p>
        <a href="{{ page.link_olx }}" target="_blank" class="btn-olx">Comprar na OLX</a>
    </div>
</article>
