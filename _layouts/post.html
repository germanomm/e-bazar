---
layout: default
---
<style>
    .back-btn { margin-bottom: 40px; display: inline-block; }
    .btn-link {
        text-decoration: none;
        color: var(--text-secondary);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
    }

    .product-page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: center;
    }

    .product-view {
        background: var(--card-bg);
        border-radius: 60px;
        padding: 60px;
        border: 1px solid var(--border);
    }

    .product-view img {
        width: 100%;
        height: auto;
        border-radius: 20px;
    }

    .product-data h2 { 
        font-size: 32px; font-weight: 300; letter-spacing: 0.05em; margin-bottom: 20px; 
    }
    /* Preço em destaque na página interna */
    .product-data .price { 
        font-size: 28px; 
        color: #b38b59; 
        font-weight: 700; 
        margin-bottom: 30px; 
    }
    .product-data .description { 
        font-size: 16px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 40px; 
    }

    @media (max-width: 900px) {
        .product-page { grid-template-columns: 1fr; gap: 40px; text-align: center; }
    }
</style>

<div class="back-btn">
    <a href="/" class="btn-link">← Voltar para vitrine</a>
</div>

<article class="product-page">
    <div class="product-view">
        <img src="{{ page.imagem }}" alt="{{ page.title }}">
    </div>
    <div class="product-data">
        <h2>{{ page.title }}</h2>
        <div class="price">R$ {{ page.preco }}</div>
        <div class="description">{{ content }}</div>
        <a href="{{ page.link_olx }}" target="_blank" class="btn-olx">Comprar via OLX</a>
    </div>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Product",
  "name": "{{ page.title }}",
  "image": "{{ site.url }}{{ page.imagem }}",
  "description": "{{ content | strip_html | truncate: 160 }}",
  "offers": {
    "@type": "Offer",
    "priceCurrency": "BRL",
    "price": "{{ page.preco | replace: '.', '' | replace: ',', '.' }}",
    "url": "{{ site.url }}{{ page.url }}"
  }
}
</script>
